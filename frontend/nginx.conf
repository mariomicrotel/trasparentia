server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Limite upload (deve corrispondere al limite applicativo nel backend)
    client_max_body_size 25M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # SPA: tutte le route servono index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API verso il backend FastAPI
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        # Propaga limite upload al backend
        proxy_request_buffering off;
    }
}
